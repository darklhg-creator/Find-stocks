name: 추세 모멘텀 전략 봇 (MACD+DMI+ADX)

on:
  schedule:
    # 한국 장 마감 후 오후 4시 30분 (UTC 07:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  run-trend-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install pykrx finance-datareader pandas requests

      - name: 봇 실행
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python start.py
